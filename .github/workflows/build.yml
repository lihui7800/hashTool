name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — self-contained EXE (embeds JRE via jlink + jpackage)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install WiX Toolset 3
        shell: pwsh
        run: |
          choco install wixtoolset --version 3.14.1 -y --no-progress
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wixPath) {
            echo $wixPath | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          }

      - name: Build Windows EXE installer
        shell: pwsh
        run: |
          mvn -B clean package javafx:jlink -Pwindows
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          jpackage `
            --type exe `
            --runtime-image target/sha256tool-runtime `
            --name SHA256Tool `
            --app-version 1.0.0 `
            --vendor ENSS `
            --dest staging `
            --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --win-menu-group SHA256Tool

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: sha256tool-windows-exe
          path: staging/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux — DEB (Debian/Ubuntu) + RPM (RHEL/Fedora), both with embedded JRE
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # rpm-build is required by jpackage to produce RPM packages on Debian-based runners
      - name: Install RPM build tools
        run: sudo apt-get update -q && sudo apt-get install -y rpm fakeroot

      - name: Build DEB package
        run: |
          mvn -B clean package javafx:jlink -Plinux-deb
          jpackage --type deb --runtime-image target/sha256tool-runtime --name SHA256Tool --app-version 1.0.0 --vendor ENSS --dest target --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp

      # Stage DEB before the next clean wipes target/
      - name: Stage DEB installer
        run: |
          mkdir -p staging
          find . -name "*.deb" ! -path "./.git/*" -exec cp {} staging/ \;

      - name: Build RPM package
        run: |
          mvn -B clean package javafx:jlink -Plinux-rpm
          jpackage --type rpm --runtime-image target/sha256tool-runtime --name SHA256Tool --app-version 1.0.0 --vendor ENSS --dest target --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp

      - name: Stage RPM installer
        run: find . -name "*.rpm" ! -path "./.git/*" -exec cp {} staging/ \;

      - name: Upload Linux packages (DEB + RPM)
        uses: actions/upload-artifact@v4
        with:
          name: sha256tool-linux-packages
          path: staging/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS — DMG disk image with embedded JRE
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build macOS DMG installer
        run: |
          mvn -B clean package javafx:jlink -Pmacos
          jpackage --type dmg --runtime-image target/sha256tool-runtime --name SHA256Tool --app-version 1.0.0 --vendor ENSS --dest target --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp

      - name: Stage DMG installer
        run: |
          mkdir -p staging
          find . -name "*.dmg" ! -path "./.git/*" -exec cp {} staging/ \;

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: sha256tool-macos-dmg
          path: staging/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Release — collect all installers and publish to GitHub Releases
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: sha256tool-windows-exe
          path: dist/

      - name: Download Linux packages (DEB + RPM)
        uses: actions/download-artifact@v4
        with:
          name: sha256tool-linux-packages
          path: dist/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: sha256tool-macos-dmg
          path: dist/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
