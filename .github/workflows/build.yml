name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — self-contained EXE installer (JRE bundled via jlink + jpackage)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve app version
        id: ver
        shell: pwsh
        run: |
          $v = mvn help:evaluate -Dexpression=project.version -q -DforceStdout
          "APP_VERSION=$v" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT

      - name: Ensure WiX Toolset 3 is on PATH
        shell: pwsh
        run: |
          $wixBin = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin" -ErrorAction SilentlyContinue |
                    Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          if ($wixBin) {
            Write-Host "Found WiX at: $wixBin"
            $wixBin | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          } else {
            choco upgrade wixtoolset -y --no-progress
            $wixBin = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin" |
                      Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
            $wixBin | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          }

      - name: Build custom JRE image (jlink)
        shell: pwsh
        run: mvn -B clean package javafx:jlink

      - name: Create Windows EXE installer (jpackage)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          jpackage `
            --type exe `
            --runtime-image target/sha256tool-runtime `
            --name SHA256Tool `
            --app-version ${{ steps.ver.outputs.APP_VERSION }} `
            --vendor ENSS `
            --dest staging `
            --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --win-menu-group SHA256Tool

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: sha256tool-windows-exe
          path: staging/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux — DEB (Debian/Ubuntu) + RPM (RHEL/Fedora), both with embedded JRE
  # Single jlink build → two jpackage calls (avoids redundant maven clean)
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve app version
        id: ver
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "APP_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # rpmbuild is needed by jpackage to produce RPM packages on Debian-based runners
      - name: Install RPM build tools
        run: sudo apt-get update -q && sudo apt-get install -y rpm fakeroot

      - name: Build custom JRE image (jlink)
        run: mvn -B clean package javafx:jlink

      - name: Create DEB and RPM packages (jpackage)
        run: |
          mkdir -p staging

          # Debian / Ubuntu
          jpackage --type deb \
            --runtime-image target/sha256tool-runtime \
            --name sha256tool \
            --app-version ${{ steps.ver.outputs.APP_VERSION }} \
            --vendor ENSS \
            --dest staging \
            --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp \
            --linux-shortcut

          # RHEL / Fedora / openSUSE
          jpackage --type rpm \
            --runtime-image target/sha256tool-runtime \
            --name sha256tool \
            --app-version ${{ steps.ver.outputs.APP_VERSION }} \
            --vendor ENSS \
            --dest staging \
            --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp \
            --linux-shortcut

      - name: Upload Linux packages (DEB + RPM)
        uses: actions/upload-artifact@v4
        with:
          name: sha256tool-linux-packages
          path: staging/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS — DMG disk image with embedded JRE
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve app version
        id: ver
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "APP_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build custom JRE image (jlink)
        run: mvn -B clean package javafx:jlink

      - name: Create macOS DMG installer (jpackage)
        run: |
          mkdir -p staging
          jpackage --type dmg \
            --runtime-image target/sha256tool-runtime \
            --name SHA256Tool \
            --app-version ${{ steps.ver.outputs.APP_VERSION }} \
            --vendor ENSS \
            --dest staging \
            --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: sha256tool-macos-dmg
          path: staging/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Release — aggregate all installers → publish to GitHub Releases
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: sha256tool-windows-exe
          path: dist/

      - name: Download Linux packages (DEB + RPM)
        uses: actions/download-artifact@v4
        with:
          name: sha256tool-linux-packages
          path: dist/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: sha256tool-macos-dmg
          path: dist/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
