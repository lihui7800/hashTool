name: Build and Release

# 当推送匹配 v*.*.* 格式的 tag 时触发（如 v1.0.0）
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─────────────────────────────────────────────
  # 多平台构建：Windows / Linux / macOS
  # ─────────────────────────────────────────────
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # jpackage 会将完整 JRE 内嵌进安装包，运行兼容性由 JRE 本身保证，
          # 与构建用的 runner 版本无关，产物可运行在 Windows 10 / Windows 11 上。
          - os: windows-latest
            pkg_type: exe
            artifact_name: SHA256Tool-Windows
          - os: ubuntu-latest
            pkg_type: deb
            artifact_name: SHA256Tool-Linux
          - os: macos-latest
            pkg_type: dmg
            artifact_name: SHA256Tool-macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 从 tag（如 v1.2.3）中提取版本号（去掉前缀 v）
      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 使用 javafx-maven-plugin 执行 jlink，生成 target/sha256tool-runtime
      - name: Build runtime image (jlink)
        run: mvn -B javafx:jlink

      # ── Windows：安装 WiX 3.x（jpackage 依赖） ─
      - name: Install WiX Toolset 3.x
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wixZip = "$env:RUNNER_TEMP\wix311-binaries.zip"
          $wixDir = "$env:RUNNER_TEMP\wix311"
          Invoke-WebRequest -Uri 'https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip' -OutFile $wixZip
          Expand-Archive $wixZip -DestinationPath $wixDir
          echo "$wixDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # ── Windows 打包 ──────────────────────────
      - name: Package – Windows (.exe + .msi)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force staging | Out-Null
          # 公共参数
          $common = @(
            '--name', 'SHA256Tool',
            '--app-version', '${{ steps.version.outputs.VERSION }}',
            '--runtime-image', 'target/sha256tool-runtime',
            '--module', 'com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp',
            '--dest', 'staging',
            '--win-shortcut',
            '--win-menu',
            '--win-dir-chooser'
          )
          # 生成 EXE 安装包
          jpackage --type exe @common
          # 生成 MSI 安装包
          jpackage --type msi @common

      # ── Linux 打包 ────────────────────────────
      - name: Install fakeroot (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y fakeroot

      - name: Package – Linux (.deb)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          jpackage \
            --type ${{ matrix.pkg_type }} \
            --name SHA256Tool \
            --app-version ${{ steps.version.outputs.VERSION }} \
            --runtime-image target/sha256tool-runtime \
            --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp \
            --dest staging \
            --linux-shortcut

      # ── macOS 打包 ────────────────────────────
      - name: Package – macOS (.dmg)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          jpackage \
            --type ${{ matrix.pkg_type }} \
            --name SHA256Tool \
            --app-version ${{ steps.version.outputs.VERSION }} \
            --runtime-image target/sha256tool-runtime \
            --module com.enss.sha256tool/com.enss.sha256tool.Sha256ToolApp \
            --dest staging

      # 上传各平台安装包为工作流 artifact，供 release job 使用
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: staging/
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # 创建 GitHub Release 并上传安装包
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write   # 允许创建 Release

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts        # 下载到 artifacts/<artifact_name>/ 子目录

      - name: List downloaded files
        run: find artifacts -type f

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # 自动生成 changelog
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.dmg
